name: Evidex
version: '${version}'
main: com.evidex.EvidexPlugin
api-version: '1.21'
authors: [evidex]
description: Server-side replay system for hack detection
commands:
  evidex:
    description: Evidex replay commands
    usage: /evidex <record|replay|stop> [player]
    permission: evidex.admin
permissions:
  evidex.admin:
    description: Allows use of evidex commands
    default: op
