# =============================================================================
# Evidex — Guía de configuración (léela antes de grabar evidencias)
# =============================================================================
#
# QUÉ HACER (paso a paso):
#   1. Reinicia el servidor limpio (/stop + arranque). NO uses /reload.
#   2. Graba con /evidex record <jugador> o el botón GRABAR del dashboard.
#   3. Para evidencia útil: que haya mobs u otros jugadores CERCA del sospechoso.
#   4. Reproduce desde el dashboard → elige un admin online → REPRODUCIR.
#   5. El admin verá el replay EN EL JUEGO con entidades capturadas (NPCs + mobs).
#   6. El replay siempre es en primera persona (los ojos del sospechoso).
#
# QUÉ NO HACER:
#   - NO uses /reload — rompe PacketEvents y los NPCs no aparecerán.
#   - NO reproduzcas grabaciones hechas ANTES de la v4 (no tienen mobs/entidades).
#   - NO grabes en mundos que no estarán cargados al revisar la evidencia.
#   - NO pongas entity-radius ni max-entities muy alto en servidores llenos de mobs.
#   - NO esperes ver NPCs si solo había 1 jugador online al grabar (no hay "otros").
#   - NO cambies capture-visible-only a true si quieres detectar hacks de reach/ESP
#     (solo captura lo que el jugador miraba directamente).
#
# =============================================================================

database:
  type: sqlite
  path: evidex.db
  host: localhost
  port: 3306
  name: evidex
  user: evidex
  password: ''
  pool-size: 10
  params: ''

storage:
  # Carpeta donde se guardan fotogramas (.evf) y snapshot del mundo (.evw)
  frames-dir: frames

recording:
  # Cada cuántos ticks se guarda un fotograma (2 ≈ 10 fps). Más bajo = más detalle y más peso.
  tick-interval: 2
  # Duración máxima en ms (3600000 = 1 hora). 0 = sin límite.
  max-duration: 3600000

  # Radio del snapshot del mundo al iniciar la grabación (bloques alrededor del jugador)
  world-radius: 64
  world-height: 64

  # --- Captura de entidades (jugadores, mobs, ítems) ---
  # Radio en bloques. Se capturan las entidades más cercanas hasta el máximo.
  entity-radius: 64
  # Máximo de entidades por fotograma (ordenadas por distancia, no solo jugadores primero)
  max-entities-per-frame: 48
  # Otros jugadores → NPC con skin real en el replay (solo visible al admin)
  capture-players: true
  # Mobs, animales, villagers, armor stands vivos, etc.
  capture-mobs: true
  # Ítems en el suelo (útil para dupes; aumenta el tamaño del archivo)
  capture-items: false
  # Si true: solo entidades dentro del campo de visión del jugador grabado
  capture-visible-only: false
  # Ángulo del cono de visión (grados). Solo aplica si capture-visible-only: true
  capture-fov-degrees: 110

  # Snapshot del mundo tras parar la grabación (en segundo plano)
  path-snapshot-enabled: true
  path-snapshot-max-samples: 12
  path-snapshot-tick-interval: 5
  world-snapshot-slices: 16
  world-snapshot-slice-interval: 3

replay:
  # Teletransportar al admin al mundo donde se grabó
  teleport-to-world: true

  # El replay es SIEMPRE en primera persona: vives lo que vio el sospechoso.

  # Modo evidencia: ocultar jugadores/mobs/items del servidor en vivo (solo el admin viewer)
  isolate-live-entities: true
  # Aplicar snapshot de bloques grabado (.evw) y restaurar al salir
  apply-world-snapshot: true
  world-overlay-blocks-per-tick: 3000
  # Bloquear interacción del admin durante el replay
  lock-input: true

  # NPCs de otros jugadores capturados (requiere PacketEvents + grabación nueva)
  show-player-npcs: true
  # Marcadores de mobs con nombre (solo visibles para el admin en replay)
  show-mob-markers: true
  # Barra de acción con frame y conteo de entidades
  show-action-bar: true

cleanup:
  enabled: true
  retention-days: 30
  interval: 3600

detection:
  enabled: true
  exempt-permission: evidex.bypass
  exempt-creative: true
  exempt-spectator: true
  # Mundos donde NO corren checks (ej: lobby, minijuegos)
  disabled-worlds: []
  # Si no está vacío, solo estos mundos tienen detección (ej: [world, world_nether])
  enabled-worlds-only: []
  # Segundos sin flags tras entrar (evita falsos positivos al cargar chunks)
  join-grace-seconds: 5
  # 1.0 = normal | 1.5 = más estricto | 0.75 = más permisivo
  sensitivity-multiplier: 1.0
  # Milisegundos entre alertas del mismo check por jugador
  alert-cooldown-ms: 1500
  vl-decay-factor: 0.85
  lag-compensation:
    enabled: true
    reach-per-ms: 0.003
    # Mide latencia real con transacciones de PacketEvents (ping/pong). Si falla
    # o está apagado, usa el ping de Bukkit como respaldo.
    use-transactions: true
    transaction-interval-ticks: 20
    # Por encima de este ping (ms) se relajan/saltan los checks de movimiento
    # para no marcar lag como trampa.
    max-ping-ms: 400
    # Por debajo de estos TPS del servidor se relajan/saltan los checks.
    min-tps: 18.0
  auto-record-on-flag: true
  auto-record-on-first-flag: true
  auto-record-min-vl: 5
  alert-staff: true
  decay-interval-ticks: 100
  # Guarda los últimos N segundos ANTES del flag y los antepone a la auto-grabación
  pre-buffer:
    enabled: true
    seconds: 10
    tick-interval: 2
    auto-only: true
  checks:
    # --- MOVIMIENTO ---
    flight:
      enabled: true
      max-vl: 20
      flag-vl: 5
      vl-add: 2
      max-air-ticks: 40
    speed:
      enabled: true
      max-vl: 20
      flag-vl: 5
      vl-add: 1
      max-speed: 0.85
    nofall:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
      min-fall-distance: 3.5
    jesus:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
    step:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 2
      max-step-height: 0.6
    spider:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
    timer:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 2
      max-moves-per-second: 22
    blink:
      enabled: true
      max-vl: 20
      flag-vl: 4
      vl-add: 4
      max-blink-distance: 8.0
    # --- COMBATE ---
    reach:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
      max-distance: 3.5
    killaura:
      enabled: true
      max-vl: 20
      flag-vl: 4
      vl-add: 3
      max-angle: 75
      max-targets: 2
    autoclick:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 2
      max-cps: 18
    aimassist:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 2
      snap-degrees: 35
    wallhit:
      enabled: true
      max-vl: 20
      flag-vl: 4
      vl-add: 4
      min-wall-blocks: 1
    badrotation:
      enabled: true
      max-vl: 10
      flag-vl: 3
      vl-add: 2
      max-pitch: 91
    velocity:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
      min-kb-ratio: 0.25
    # --- JUGADOR / MUNDO ---
    xray:
      enabled: true
      max-vl: 20
      flag-vl: 4
      vl-add: 4
      min-hidden-ores: 1
    fastbreak:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 2
      min-break-ms: 80
    scaffold:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
      max-places-per-second: 12
    fasteat:
      enabled: true
      max-vl: 10
      flag-vl: 3
      vl-add: 2
      min-eat-ms: 900
    cheststealer:
      enabled: true
      max-vl: 15
      flag-vl: 4
      vl-add: 3
      max-clicks-per-window: 8
      window-ms: 400
    fastinventory:
      enabled: true
      max-vl: 10
      flag-vl: 3
      vl-add: 2
      max-clicks-per-second: 25

dashboard:
  enabled: true
  port: 9090
  # SEGURIDAD: el dashboard es HTTP plano (sin TLS) y expone control total.
  # Por defecto escucha SOLO en localhost. Accedé por túnel SSH:
  #   ssh -L 9090:127.0.0.1:9090 usuario@tu-servidor
  # Si necesitás acceso remoto directo, ponelo detrás de un reverse proxy
  # con HTTPS (nginx/caddy). NO uses 0.0.0.0 sin proxy + TLS.
  bind-address: 127.0.0.1