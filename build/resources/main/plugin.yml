name: Evidex
version: '1.0.0'
main: com.evidex.EvidexPlugin
api-version: '1.21'
authors: [evidex]
description: Server-side replay system for hack detection (Paper/Spigot 1.21 - 26.2)
commands:
  evidex:
    description: Evidex replay commands
    usage: /evidex <record|replay|stop|list|alerts|violations|check> [player]
    permission: evidex.admin
permissions:
  evidex.admin:
    description: Allows use of evidex commands
    default: op
  evidex.bypass:
    description: Exempt from anti-cheat detection
    default: op
  evidex.alerts:
    description: Receive in-game detection alerts
    default: op
  evidex.detection.admin:
    description: View violation details and VL checks
    default: op
