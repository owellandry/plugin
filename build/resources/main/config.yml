# =============================================================================
# Evidex — Guía de configuración (léela antes de grabar evidencias)
# =============================================================================
#
# QUÉ HACER (paso a paso):
#   1. Reinicia el servidor limpio (/stop + arranque). NO uses /reload.
#   2. Graba con /evidex record <jugador> o el botón GRABAR del dashboard.
#   3. Para evidencia útil: que haya mobs u otros jugadores CERCA del sospechoso.
#   4. Reproduce desde el dashboard → elige un admin online → REPRODUCIR.
#   5. El admin verá el replay EN EL JUEGO con entidades capturadas (NPCs + mobs).
#   6. El replay siempre es en primera persona (los ojos del sospechoso).
#
# QUÉ NO HACER:
#   - NO uses /reload — rompe PacketEvents y los NPCs no aparecerán.
#   - NO reproduzcas grabaciones hechas ANTES de la v4 (no tienen mobs/entidades).
#   - NO grabes en mundos que no estarán cargados al revisar la evidencia.
#   - NO pongas entity-radius ni max-entities muy alto en servidores llenos de mobs.
#   - NO esperes ver NPCs si solo había 1 jugador online al grabar (no hay "otros").
#   - NO cambies capture-visible-only a true si quieres detectar hacks de reach/ESP
#     (solo captura lo que el jugador miraba directamente).
#
# =============================================================================

database:
  type: sqlite
  path: evidex.db
  host: localhost
  port: 3306
  name: evidex
  user: evidex
  password: ''
  pool-size: 10
  params: ''

storage:
  # Carpeta donde se guardan fotogramas (.evf) y snapshot del mundo (.evw)
  frames-dir: frames

recording:
  # Cada cuántos ticks se guarda un fotograma (2 ≈ 10 fps). Más bajo = más detalle y más peso.
  tick-interval: 2
  # Duración máxima en ms (3600000 = 1 hora). 0 = sin límite.
  max-duration: 3600000

  # Radio del snapshot del mundo al iniciar la grabación (bloques alrededor del jugador)
  world-radius: 64
  world-height: 64

  # --- Captura de entidades (jugadores, mobs, ítems) ---
  # Radio en bloques. Se capturan las entidades más cercanas hasta el máximo.
  entity-radius: 64
  # Máximo de entidades por fotograma (ordenadas por distancia, no solo jugadores primero)
  max-entities-per-frame: 48
  # Otros jugadores → NPC con skin real en el replay (solo visible al admin)
  capture-players: true
  # Mobs, animales, villagers, armor stands vivos, etc.
  capture-mobs: true
  # Ítems en el suelo (útil para dupes; aumenta el tamaño del archivo)
  capture-items: false
  # Si true: solo entidades dentro del campo de visión del jugador grabado
  capture-visible-only: false
  # Ángulo del cono de visión (grados). Solo aplica si capture-visible-only: true
  capture-fov-degrees: 110

  # Snapshot del mundo tras parar la grabación (en segundo plano)
  path-snapshot-enabled: true
  path-snapshot-max-samples: 12
  path-snapshot-tick-interval: 5
  world-snapshot-slices: 16
  world-snapshot-slice-interval: 3

replay:
  # Teletransportar al admin al mundo donde se grabó
  teleport-to-world: true

  # El replay es SIEMPRE en primera persona: vives lo que vio el sospechoso.

  # NPCs de otros jugadores capturados (requiere PacketEvents + grabación nueva)
  show-player-npcs: true
  # Marcadores de mobs con nombre (solo visibles para el admin en replay)
  show-mob-markers: true
  # Barra de acción con frame y conteo de entidades
  show-action-bar: true

cleanup:
  enabled: true
  retention-days: 30
  interval: 3600

dashboard:
  enabled: true
  port: 9090
  bind-address: 0.0.0.0